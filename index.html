<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>500 个常用英语单词</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fbfaf6;
      --paper: #ffffff;
      --ink: #293136;
      --muted: #7a8584;
      --line: #e5ddd2;
      --accent: #4f9a8b;
      --accent-dark: #357d70;
      --soft: #eef7f3;
      --panel: rgba(255, 255, 255, .72);
      --mark: #ffe071;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(255, 224, 113, .18), transparent 26%),
        linear-gradient(180deg, #fbfaf6 0%, #f2f7f4 100%);
      color: var(--ink);
    }

    main {
      width: min(1760px, calc(100% - 24px));
      margin: 0 auto;
      padding: 26px 0 38px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 14px;
      padding: 14px 16px;
      border: 1px solid rgba(229, 221, 210, .82);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 14px 36px rgba(72, 83, 84, .08);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.08;
      letter-spacing: 0;
      font-weight: 760;
    }

    .tools {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    input {
      width: min(340px, 100%);
      height: 42px;
      border: 1px solid rgba(229, 221, 210, .95);
      border-radius: 8px;
      padding: 0 14px;
      font-size: 15px;
      background: var(--paper);
      color: var(--ink);
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(22, 124, 128, .16);
    }

    button {
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-dark);
    }

    .tabs {
      display: flex;
      gap: 6px;
      margin: 0;
      padding: 5px;
      width: fit-content;
      border: 1px solid rgba(229, 221, 210, .82);
      border-radius: 8px;
      background: rgba(255, 255, 255, .68);
    }

    .tab-button {
      width: auto;
      min-width: 94px;
      height: 34px;
      padding: 0 14px;
      border: 0;
      background: transparent;
      color: #566361;
      font-weight: 650;
    }

    .tab-button.is-active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .tab-button.is-drop-target {
      border-color: #d1a900;
      background: #fff4b8;
      color: #4d3f00;
      box-shadow: 0 0 0 3px rgba(255, 216, 77, .35);
    }

    .grid-wrap {
      overflow-x: auto;
      padding: 10px 10px 12px;
      border: 1px solid rgba(229, 221, 210, .72);
      border-radius: 8px;
      background: rgba(255, 255, 255, .45);
    }

    .workspace-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .view-tools {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .count-badge {
      min-width: 62px;
      height: 34px;
      padding: 0 12px;
      border: 1px solid rgba(229, 221, 210, .82);
      border-radius: 8px;
      background: rgba(255, 255, 255, .72);
      color: #5a6765;
      font-size: 14px;
      font-weight: 700;
      line-height: 32px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .word-grid {
      display: grid;
      grid-template-columns: repeat(15, minmax(104px, 1fr));
      gap: 9px;
      align-items: stretch;
      min-width: 1685px;
    }

    .word-card {
      position: relative;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 88px;
      padding: 9px 8px 8px;
      border: 1px solid rgba(229, 221, 210, .9);
      border-radius: 8px;
      background: rgba(255, 255, 255, .88);
      box-shadow: 0 8px 18px rgba(72, 83, 84, .06);
    }

    .word-card:hover {
      transform: translateY(-1px);
      border-color: rgba(79, 154, 139, .58);
      background: var(--soft);
      box-shadow: 0 12px 22px rgba(72, 83, 84, .1);
    }

    .word-card[draggable="true"] {
      cursor: grab;
    }

    .word-card.is-dragging {
      cursor: grabbing;
      opacity: .45;
    }

    .word-card.is-highlighted {
      border-color: #e5be35;
      background: #fff4bd;
      box-shadow: 0 8px 18px rgba(191, 144, 0, .13);
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 5px;
      margin-bottom: 6px;
    }

    .card-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .card-actions button {
      width: 24px;
      height: 24px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: #edf6f2;
      color: #425056;
      font-size: 12px;
    }

    .card-actions button:hover {
      background: #dfeaec;
    }

    .card-actions .speak-button {
      background: var(--accent);
      color: #fff;
    }

    .card-actions .speak-button:hover {
      background: var(--accent-dark);
    }

    .card-actions .delete-button {
      background: #f3e8e5;
      color: #7a3528;
    }

    .card-actions .delete-button:hover {
      background: #ead6d1;
    }

    .card-actions .restore-button {
      background: #e6f1eb;
      color: #23603f;
    }

    .card-actions .restore-button:hover {
      background: #d5e8dd;
    }

    .num {
      color: var(--muted);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }

    .word {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 4px;
      color: var(--ink);
      font-size: 15px;
      font-weight: 800;
      line-height: 1.12;
    }

    .meaning {
      display: -webkit-box;
      overflow: hidden;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      color: #394449;
      font-size: 12px;
      line-height: 1.25;
    }

    .empty {
      display: none;
      padding: 32px;
      text-align: center;
      color: var(--muted);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .context-menu {
      position: fixed;
      z-index: 20;
      display: none;
      min-width: 138px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: 0 16px 34px rgba(30, 37, 40, .16);
    }

    .context-menu.is-open {
      display: grid;
      gap: 4px;
    }

    .context-menu button {
      width: 100%;
      height: 34px;
      padding: 0 10px;
      border-radius: 6px;
      background: transparent;
      color: #273238;
      text-align: left;
      font-size: 14px;
    }

    .context-menu button:hover {
      background: var(--soft);
    }

    @media (max-width: 720px) {
      main {
        width: min(100% - 20px, 1180px);
        padding-top: 18px;
      }

      header {
        display: block;
        padding: 12px;
      }

      .tools {
        justify-content: flex-start;
        margin-top: 14px;
      }

      .workspace-bar {
        display: block;
      }

      .view-tools {
        margin-bottom: 10px;
      }

      .tabs {
        margin-bottom: 0;
      }

      input {
        width: 100%;
      }

      .word-card {
        min-height: 76px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>500 个常用英语单词</h1>
      </div>
    </header>

    <div class="workspace-bar">
      <div class="view-tools">
        <nav class="tabs" aria-label="单词视图">
          <button class="tab-button is-active" id="wordsTab" type="button">单词</button>
          <button class="tab-button" id="trashTab" type="button">回收站</button>
        </nav>
        <span class="count-badge" id="countBadge">500</span>
      </div>
      <div class="tools">
        <input id="search" type="search" placeholder="搜索单词 / 中文意思">
      </div>
    </div>
    <div class="grid-wrap">
      <section class="word-grid" id="wordGrid" aria-label="常用英语单词"></section>
    </div>
    <div class="empty" id="empty">没有找到匹配的单词。</div>
    <div class="context-menu" id="contextMenu" role="menu">
      <button id="menuHighlight" type="button" role="menuitem">高亮</button>
      <button id="menuTrash" type="button" role="menuitem">删除到回收站</button>
    </div>
  </main>

    const grid = document.getElementById("wordGrid");
    const search = document.getElementById("search");
    const empty = document.getElementById("empty");
    const countBadge = document.getElementById("countBadge");
    const wordsTab = document.getElementById("wordsTab");
    const trashTab = document.getElementById("trashTab");
    const contextMenu = document.getElementById("contextMenu");
    const menuHighlight = document.getElementById("menuHighlight");
    const menuTrash = document.getElementById("menuTrash");
    const stateKey = "common500WordStates";
    const trashKey = "common500TrashWords";
    let wordStates = loadStates();
    let trashWords = loadTrash();
    let currentView = "words";
    let contextWord = "";

    function loadStates() {
      try {
        const saved = localStorage.getItem(stateKey);
        return saved ? JSON.parse(saved) : {};
      } catch {
        return {};
      }
    }

    function saveStates() {
      localStorage.setItem(stateKey, JSON.stringify(wordStates));
    }

    function loadTrash() {
      try {
        const saved = localStorage.getItem(trashKey);
        return saved ? JSON.parse(saved) : [];
      } catch {
        return [];
      }
    }

    function saveTrash() {
      localStorage.setItem(trashKey, JSON.stringify(trashWords));
    }

    function toggleHighlight(word) {
      if (wordStates[word] === "highlight") {
        delete wordStates[word];
      } else {
        wordStates[word] = "highlight";
      }
      saveStates();
      render(getVisibleWords());
    }

    function moveToTrash(word) {
      if (!trashWords.includes(word)) {
        trashWords.push(word);
      }
      saveTrash();
      render(getVisibleWords());
    }

    function closeContextMenu() {
      contextMenu.classList.remove("is-open");
      contextWord = "";
    }

    function openContextMenu(event, word) {
      event.preventDefault();
      contextWord = word;
      menuHighlight.textContent = wordStates[word] === "highlight" ? "取消高亮" : "高亮";
      menuTrash.textContent = currentView === "trash" ? "放回原处" : "删除到回收站";
      contextMenu.style.left = `${Math.min(event.clientX, window.innerWidth - 150)}px`;
      contextMenu.style.top = `${Math.min(event.clientY, window.innerHeight - 92)}px`;
      contextMenu.classList.add("is-open");
    }

    function restoreFromTrash(word) {
      trashWords = trashWords.filter((item) => item !== word);
      saveTrash();
      render(getVisibleWords());
    }

    function setView(view) {
      currentView = view;
      wordsTab.classList.toggle("is-active", view === "words");
      trashTab.classList.toggle("is-active", view === "trash");
      render(getVisibleWords());
    }

    function speak(text) {
      if (!("speechSynthesis" in window)) {
        alert("当前浏览器不支持发音功能。");
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.82;
      window.speechSynthesis.speak(utterance);
    }

    function render(list) {
      grid.innerHTML = "";
      list.forEach((item) => {
        const originalIndex = words.indexOf(item) + 1;
        const savedState = wordStates[item[0]] || "";
        const card = document.createElement("article");
        card.className = `word-card${savedState === "highlight" ? " is-highlighted" : ""}`;
        card.draggable = true;
        card.dataset.word = item[0];
        const actionButton = currentView === "trash"
          ? `<button class="restore-button" type="button" aria-label="放回 ${item[0]}" title="放回原处">↩</button>`
          : "";
        card.innerHTML = `
          <div class="card-top">
            <span class="num">${originalIndex}</span>
            <div class="card-actions">
              <button class="speak-button" type="button" aria-label="播放 ${item[0]} 的发音" title="发音">▶</button>
              ${actionButton}
            </div>
          </div>
          <strong class="word" title="${item[0]}">${item[0]}</strong>
          <span class="meaning" title="${item[2]}">${item[2]}</span>
        `;
        card.addEventListener("dragstart", (event) => {
          card.classList.add("is-dragging");
          event.dataTransfer.setData("text/plain", item[0]);
          event.dataTransfer.effectAllowed = "move";
        });
        card.addEventListener("dragend", () => {
          card.classList.remove("is-dragging");
          wordsTab.classList.remove("is-drop-target");
          trashTab.classList.remove("is-drop-target");
        });
        card.addEventListener("contextmenu", (event) => openContextMenu(event, item[0]));
        card.querySelector(".speak-button").addEventListener("click", () => speak(item[0]));
        if (currentView === "trash") {
          card.querySelector(".restore-button").addEventListener("click", () => {
            restoreFromTrash(item[0]);
            setView("words");
          });
        }
        grid.appendChild(card);
      });
      countBadge.textContent = list.length;
      empty.style.display = list.length ? "none" : "block";
      empty.textContent = currentView === "trash" ? "回收站里没有单词。" : "没有找到匹配的单词。";
    }

    function getVisibleWords() {
      const keyword = search.value.trim().toLowerCase();
      const baseWords = words.filter(([word]) => {
        const isTrashed = trashWords.includes(word);
        return currentView === "trash" ? isTrashed : !isTrashed;
      });
      if (!keyword) return baseWords;
      return baseWords.filter(([word, _pron, meaning]) => {
        return word.toLowerCase().includes(keyword)
          || meaning.includes(keyword);
      });
    }

    search.addEventListener("input", () => render(getVisibleWords()));
    wordsTab.addEventListener("click", () => setView("words"));
    trashTab.addEventListener("click", () => setView("trash"));
    wordsTab.addEventListener("dragover", (event) => {
      event.preventDefault();
      wordsTab.classList.add("is-drop-target");
    });
    trashTab.addEventListener("dragover", (event) => {
      event.preventDefault();
      trashTab.classList.add("is-drop-target");
    });
    wordsTab.addEventListener("dragleave", () => wordsTab.classList.remove("is-drop-target"));
    trashTab.addEventListener("dragleave", () => trashTab.classList.remove("is-drop-target"));
    wordsTab.addEventListener("drop", (event) => {
      event.preventDefault();
      wordsTab.classList.remove("is-drop-target");
      const word = event.dataTransfer.getData("text/plain");
      if (trashWords.includes(word)) restoreFromTrash(word);
      setView("words");
    });
    trashTab.addEventListener("drop", (event) => {
      event.preventDefault();
      trashTab.classList.remove("is-drop-target");
      const word = event.dataTransfer.getData("text/plain");
      if (!trashWords.includes(word)) moveToTrash(word);
    });
    menuHighlight.addEventListener("click", () => {
      if (contextWord) toggleHighlight(contextWord);
      closeContextMenu();
    });
    menuTrash.addEventListener("click", () => {
      if (contextWord && currentView === "trash") {
        restoreFromTrash(contextWord);
        setView("words");
      } else if (contextWord) {
        moveToTrash(contextWord);
      }
      closeContextMenu();
    });
    document.addEventListener("click", (event) => {
      if (!contextMenu.contains(event.target)) closeContextMenu();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeContextMenu();
    });
    render(getVisibleWords());
  </script>
